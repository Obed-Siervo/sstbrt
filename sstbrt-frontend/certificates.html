<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Certificados | SSTBRT</title>    
  <link rel="stylesheet" href="responsive.css">

  <link rel="stylesheet" href="/dashboard.css">
    <link rel="icon" href="/images/favicon.ico">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="dashboard-layout">

  <!-- SIDEBAR -->
 <aside class="sidebar">
    <div class="sidebar-top">
      <div class="brand">
        <img src="/images/favicon.ico" alt="SSTBRT Logo" class="brand-logo">
        <div>
          <h2>SSTBRT</h2>
          <span>Academy</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="/dashboard" class="nav-item">
          <i class="fas fa-house"></i>
          <span>Dashboard</span>
        </a>

                <a href="/courses" class="nav-item">
          <i class="fas fa-chalkboard-teacher"></i>
          <span>Cursos</span>
        </a>


        <a href="/my-courses" class="nav-item">
          <i class="fas fa-book-open"></i>
          <span>Mis Cursos</span>
        </a>

        <a href="/progress" class="nav-item">
          <i class="fas fa-chart-line"></i>
          <span>Progreso</span>
        </a>

        <a href="/certificates" class="nav-item active">
          <i class="fas fa-award"></i>
          <span>Certificados</span>
        </a>

        <a href="/profile" class="nav-item">
          <i class="fas fa-user"></i>
          <span>Perfil</span>
        </a>
      </nav>
    </div>

    <div class="sidebar-bottom">
      <button class="logout-btn" onclick="handleLogout()">
        <i class="fas fa-right-from-bracket"></i>
        <span>Cerrar sesión</span>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="dashboard-main">

    <div class="topbar">
      <h1>Mis Certificados</h1>
    </div>

    <div id="certificatesContainer"></div>

  </main>
</div>

<script src="/certificates.js"></script>
</body>
</html>
